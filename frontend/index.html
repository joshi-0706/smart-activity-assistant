<!DOCTYPE html>
<html>
<head>
    <title>Smart Activity Assistant</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #4facfe, #00f2fe);
            text-align: center;
            margin: 0;
            padding: 0;
        }

        .container {
            margin-top: 100px;
            background: white;
            padding: 30px;
            width: 400px;
            margin-left: auto;
            margin-right: auto;
            border-radius: 10px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
        }

        h1 {
            color: #333;
        }

        input {
            width: 80%;
            padding: 10px;
            margin-top: 15px;
            border-radius: 5px;
            border: 1px solid #ccc;
            font-size: 16px;
        }

        button {
            margin-top: 15px;
            padding: 10px 20px;
            background: #4facfe;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #007bff;
        }

        #output {
            margin-top: 20px;
            font-size: 18px;
            color: #333;
            font-weight: bold;
        }

        .suggestions {
            margin-top: 10px;
        }

        .tag {
            display: inline-block;
            background: #e0f7fa;
            color: #00796b;
            padding: 8px 12px;
            margin: 5px;
            border-radius: 20px;
            font-size: 14px;
        }
    </style>
</head>

<body>

<div class="container">
    <h1>Smart Activity Assistant</h1>

    <input type="text" id="inputText" placeholder="Type something...">
    <br>

    <button onclick="predict()">Predict</button>

    <div id="output"></div>
    <div class="suggestions" id="suggestions"></div>
</div>

<script>
function predict() {
    let text = document.getElementById("inputText").value;

    if (text.trim() === "") {
        alert("Please enter text");
        return;
    }

    // Clear previous results
    document.getElementById("output").innerText = "Loading...";
    document.getElementById("suggestions").innerHTML = "";

    fetch("http://127.0.0.1:5000/predict_text", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ text: text })
    })
    .then(response => response.json())
    .then(data => {
        document.getElementById("output").innerText = "Suggestions:";

        let suggestionsDiv = document.getElementById("suggestions");
        suggestionsDiv.innerHTML = "";

        data.suggestions.forEach(word => {
            let span = document.createElement("span");
            span.className = "tag";
            span.innerText = word;
            suggestionsDiv.appendChild(span);
        });
    })
    .catch(error => {
        console.error(error);
        document.getElementById("output").innerText = "Error fetching data";
    });
}

// 🔥 BONUS: Press Enter to predict
document.getElementById("inputText").addEventListener("keypress", function(event) {
    if (event.key === "Enter") {
        predict();
    }
});
</script>

</body>
</html>
