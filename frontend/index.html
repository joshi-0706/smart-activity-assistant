<!DOCTYPE html>
<html>
<head>
    <title>Smart Activity Assistant</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            text-align: center;
            margin: 0;
            padding: 0;
            animation: fadeIn 1s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .container {
            margin-top: 80px;
            background: white;
            padding: 35px;
            width: 420px;
            margin-left: auto;
            margin-right: auto;
            border-radius: 15px;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.25);
            animation: slideUp 0.8s ease;
        }

        @keyframes slideUp {
            from { transform: translateY(40px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
        }

        input {
            width: 85%;
            padding: 12px;
            margin-top: 15px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 16px;
            transition: 0.3s;
        }

        input:focus {
            border-color: #4facfe;
            box-shadow: 0 0 8px #4facfe;
            outline: none;
        }

        button {
            margin-top: 15px;
            padding: 10px 20px;
            background: linear-gradient(to right, #4facfe, #007bff);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0px 5px 15px rgba(0,0,0,0.3);
        }

        #output {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
        }

        .loader {
            margin-top: 10px;
            color: gray;
            font-style: italic;
        }

        .suggestions {
            margin-top: 15px;
        }

        .tag {
            display: inline-block;
            background: #e0f7fa;
            color: #00796b;
            padding: 8px 14px;
            margin: 5px;
            border-radius: 20px;
            cursor: pointer;
            opacity: 0;
            animation: fadeTag 0.5s forwards;
        }

        @keyframes fadeTag {
            to { opacity: 1; }
        }

        .tag:hover {
            background: #b2ebf2;
            transform: scale(1.1);
        }

    </style>
</head>

<body>

<div class="container">
    <h1>Smart Activity Assistant</h1>

    <input type="text" id="inputText" placeholder="Type something like 'i am'...">
    <br>

    <button onclick="predict()">Predict</button>

    <div id="output"></div>
    <div class="loader" id="loader"></div>
    <div class="suggestions" id="suggestions"></div>
</div>

<script>

const API_URL = "https://smart-backend-d8x7.onrender.com/predict_text";

function predict() {
    let text = document.getElementById("inputText").value;

    if (text.trim() === "") {
        alert("Enter some text");
        return;
    }

    document.getElementById("output").innerText = "";
    document.getElementById("suggestions").innerHTML = "";
    document.getElementById("loader").innerText = "Thinking... 🤖";

    fetch(API_URL, {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ text: text })
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("loader").innerText = "";
        document.getElementById("output").innerText = "Suggestions:";

        let box = document.getElementById("suggestions");

        data.suggestions.forEach((word, index) => {
            let span = document.createElement("span");
            span.className = "tag";
            span.style.animationDelay = (index * 0.2) + "s";
            span.innerText = word;

            span.onclick = () => {
                document.getElementById("inputText").value += " " + word;
            };

            box.appendChild(span);
        });
    })
    .catch(err => {
        console.error(err);
        document.getElementById("loader").innerText = "";
        document.getElementById("output").innerText = "Server error ❌";
    });
}

// ENTER KEY SUPPORT
document.getElementById("inputText").addEventListener("keypress", function(e) {
    if (e.key === "Enter") {
        predict();
    }
});

</script>

</body>
</html>
